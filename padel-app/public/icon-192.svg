<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="goldBody" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="50%" stop-color="#eab308"/>
      <stop offset="100%" stop-color="#a16207"/>
    </linearGradient>
    <linearGradient id="goldBand" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#ca8a04"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#fff024"/>
      <stop offset="100%" stop-color="#e6d200"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg3)"/>
  <!-- Subtle glow behind crown+ball -->
  <circle cx="256" cy="250" r="180" fill="#eab308" opacity="0.05"/>
  <circle cx="256" cy="250" r="120" fill="#eab308" opacity="0.04"/>

  <!-- === CROWN centered at x=256 === -->
  <g transform="translate(256,148)">
    <!-- Crown body — 5-point with smooth curves -->
    <path d="M-120,30 L-95,-40 L-55,0 L-25,-60 L0,-90 L25,-60 L55,0 L95,-40 L120,30 Z" fill="url(#goldBody)"/>
    <!-- Darker inner shadow for depth -->
    <path d="M-100,30 L-80,-20 L-48,8 L-22,-42 L0,-68 L22,-42 L48,8 L80,-20 L100,30 Z" fill="#ca8a04" opacity="0.3"/>
    <!-- Band at base -->
    <rect x="-120" y="30" width="240" height="24" rx="4" fill="url(#goldBand)"/>
    <!-- Band highlight line -->
    <rect x="-118" y="32" width="236" height="4" rx="2" fill="#fef9c3" opacity="0.4"/>
    <!-- Tip ornaments -->
    <circle cx="-95" cy="-40" r="10" fill="#fde68a"/>
    <circle cx="-95" cy="-40" r="5" fill="#fef9c3" opacity="0.5"/>
    <circle cx="-25" cy="-60" r="9" fill="#fde68a"/>
    <circle cx="-25" cy="-60" r="4.5" fill="#fef9c3" opacity="0.5"/>
    <circle cx="0" cy="-90" r="12" fill="#fde68a"/>
    <circle cx="0" cy="-90" r="6" fill="#fef9c3" opacity="0.5"/>
    <circle cx="25" cy="-60" r="9" fill="#fde68a"/>
    <circle cx="25" cy="-60" r="4.5" fill="#fef9c3" opacity="0.5"/>
    <circle cx="95" cy="-40" r="10" fill="#fde68a"/>
    <circle cx="95" cy="-40" r="5" fill="#fef9c3" opacity="0.5"/>
    <!-- Gems on band -->
    <circle cx="-60" cy="42" r="7" fill="#ef4444"/>
    <circle cx="-60" cy="42" r="3" fill="#fca5a5" opacity="0.5"/>
    <circle cx="0" cy="42" r="8" fill="#22c55e"/>
    <circle cx="0" cy="42" r="3.5" fill="#86efac" opacity="0.5"/>
    <circle cx="60" cy="42" r="7" fill="#3b82f6"/>
    <circle cx="60" cy="42" r="3" fill="#93c5fd" opacity="0.5"/>
  </g>

  <!-- === BALL centered below crown === -->
  <circle cx="256" cy="310" r="72" fill="url(#ballGrad)"/>
  <!-- Ball seams -->
  <path d="M212 274 Q236 310 212 346" fill="none" stroke="#fefce8" stroke-width="4.5" opacity="0.45"/>
  <path d="M300 274 Q276 310 300 346" fill="none" stroke="#fefce8" stroke-width="4.5" opacity="0.45"/>
  <!-- Shine -->
  <circle cx="236" cy="288" r="14" fill="white" opacity="0.14"/>

  <!-- === PADEL text === -->
  <text x="256" y="452" text-anchor="middle" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="48" fill="white" letter-spacing="14">PADEL</text>
</svg>
