<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- OPTION D: Close-up racket face with ball impact -->
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <radialGradient id="impact" cx="0.55" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bgD)"/>
  <!-- Impact glow -->
  <circle cx="280" cy="230" r="240" fill="url(#impact)"/>
  <!-- Racket grid (close-up, filling most of frame, tilted) -->
  <g transform="rotate(-15 256 256)" stroke="#22c55e" stroke-width="2.5" opacity="0.35">
    <!-- Vertical lines -->
    <line x1="80" y1="20" x2="80" y2="500"/>
    <line x1="140" y1="20" x2="140" y2="500"/>
    <line x1="200" y1="20" x2="200" y2="500"/>
    <line x1="260" y1="20" x2="260" y2="500"/>
    <line x1="320" y1="20" x2="320" y2="500"/>
    <line x1="380" y1="20" x2="380" y2="500"/>
    <line x1="440" y1="20" x2="440" y2="500"/>
    <!-- Horizontal lines -->
    <line x1="20" y1="60" x2="500" y2="60"/>
    <line x1="20" y1="120" x2="500" y2="120"/>
    <line x1="20" y1="180" x2="500" y2="180"/>
    <line x1="20" y1="240" x2="500" y2="240"/>
    <line x1="20" y1="300" x2="500" y2="300"/>
    <line x1="20" y1="360" x2="500" y2="360"/>
    <line x1="20" y1="420" x2="500" y2="420"/>
    <line x1="20" y1="480" x2="500" y2="480"/>
  </g>
  <!-- Ball smashing through -->
  <circle cx="280" cy="230" r="68" fill="#eab308"/>
  <path d="M238 190 Q260 230 238 270" fill="none" stroke="#fefce8" stroke-width="5" opacity="0.5"/>
  <path d="M322 190 Q300 230 322 270" fill="none" stroke="#fefce8" stroke-width="5" opacity="0.5"/>
  <circle cx="264" cy="212" r="16" fill="white" opacity="0.18"/>
  <!-- Impact burst lines -->
  <g stroke="#22c55e" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <line x1="280" y1="140" x2="280" y2="110"/>
    <line x1="200" y1="190" x2="175" y2="170"/>
    <line x1="360" y1="190" x2="385" y2="170"/>
    <line x1="200" y1="270" x2="175" y2="290"/>
    <line x1="360" y1="270" x2="385" y2="290"/>
    <line x1="280" y1="320" x2="280" y2="350"/>
    <line x1="355" y1="230" x2="390" y2="230"/>
    <line x1="205" y1="230" x2="170" y2="230"/>
  </g>
</svg>
